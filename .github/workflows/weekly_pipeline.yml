name: Weekly ML Pipeline

on:
  schedule:
    - cron: '0 15 * * 5'  # Every Friday at 15:00 UTC
  workflow_dispatch:        # Allow manual trigger from GitHub UI

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    permissions:
      actions: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run feature pipeline
        env:
          HOPSWORKS_HOST: ${{ secrets.HOPSWORKS_HOST }}
          HOPSWORKS_API_KEY: ${{ secrets.HOPSWORKS_API_KEY }}
          HOPSWORKS_PROJECT: ${{ secrets.HOPSWORKS_PROJECT }}
          AZURE_SAS_URL: ${{ secrets.AZURE_SAS_URL }}
          AZURE_BLOB_NAME: ${{ secrets.AZURE_BLOB_NAME }}
        run: python -m pipelines.feature.run

      - name: Retrain if drift detected
        env:
          HOPSWORKS_HOST: ${{ secrets.HOPSWORKS_HOST }}
          HOPSWORKS_API_KEY: ${{ secrets.HOPSWORKS_API_KEY }}
          HOPSWORKS_PROJECT: ${{ secrets.HOPSWORKS_PROJECT }}
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
          MLFLOW_TRACKING_USERNAME: ${{ secrets.MLFLOW_TRACKING_USERNAME }}
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.MLFLOW_TRACKING_PASSWORD }}
        run: python -m pipelines.training.retrain_if_drift

      - name: Trigger HuggingFace deploy
        run: gh workflow run deploy_hf.yml --ref main
        env:
          GH_TOKEN: ${{ github.token }}
