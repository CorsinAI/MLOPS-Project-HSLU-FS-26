services:

  # ---------------------------------------------------------------------------
  # ML services
  # ---------------------------------------------------------------------------

  inference:
    build: .
    command: python -m pipelines.inference.run
    ports:
      - "8000:8000"
    env_file: .env

  # One-off pipeline jobs — run with:
  #   docker compose --profile pipeline run feature
  #   docker compose --profile pipeline run training
  feature:
    build: .
    command: python -m pipelines.feature.run
    env_file: .env
    profiles: [pipeline]
    volumes:
      - ./data:/app/data

  training:
    build: .
    command: python -m pipelines.training.run
    env_file: .env
    profiles: [pipeline]
